attack_technique: T1059.004
display_name: Unix Shell

atomic_tests:
  - name: Create and Execute Bash Shell Script
    auto_generated_guid: 11111111-1111-1111-1111-111111111111
    description: |
      Creates a small bash script in /tmp and executes it. Cleans up
      after itself. Used by the eyeexam atomic-loader fixture.
    supported_platforms:
      - linux
      - macos
    input_arguments:
      script_path:
        description: location of the throwaway script
        type: path
        default: /tmp/eyeexam-atomic-fixture.sh
    executor:
      name: bash
      command: |
        cat > /tmp/eyeexam-atomic-fixture.sh <<'EOF'
        echo "atomic fixture ran"
        EOF
        chmod +x /tmp/eyeexam-atomic-fixture.sh
        /tmp/eyeexam-atomic-fixture.sh
      cleanup_command: |
        rm -f /tmp/eyeexam-atomic-fixture.sh

  - name: PowerShell-only test that must be skipped on Linux
    auto_generated_guid: 22222222-2222-2222-2222-222222222222
    description: Verifies the loader skips PS-only tests with a clear marker.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: Write-Host "you should not see this"
