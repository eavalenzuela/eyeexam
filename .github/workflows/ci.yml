name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # .golangci.yml uses v2 schema (`version: "2"`, `linters.default`),
          # so v2 + action@v7. Use `latest` because go.mod targets Go
          # 1.25.7 and older v2 binaries (e.g. v2.1.6) refuse to lint
          # projects newer than the Go they were built against. Pin once
          # CI is stable. Note: Makefile pins v1.62.2 in `make tools` —
          # separate drift.
          version: latest
          args: --timeout=5m

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: go build
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -o bin/eyeexam ./cmd/eyeexam
          ./bin/eyeexam version

      - name: go mod tidy (drift check)
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod / go.sum drift — run 'go mod tidy' and commit"
            git diff go.mod go.sum
            exit 1
          fi
